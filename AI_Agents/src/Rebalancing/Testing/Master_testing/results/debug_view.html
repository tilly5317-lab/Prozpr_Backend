    letter-spacing: 1.2px;

    margin-right: 4px;

  .pill-btn {

    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-body);
    cursor: pointer;
    transition: all 0.12s;

  .pill-btn:hover { border-color: var(--accent); color: var(--text-heading); }
  .pill-btn.active {

    border-color: var(--accent);
    color: var(--accent);

  /* ------ Section card (collapsible) ------ */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: var(--radius-card);
    margin-bottom: var(--space-section);
    box-shadow: var(--shadow-sm);
    overflow: hidden;

  .section-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    gap: 12px;

  .section-header:hover { background: rgba(44,181,160,.03); }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-heading);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .section-subtitle {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }
  .section-toggle {
    font-size: 12px;
    color: var(--text-muted);

  }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }
  .section-body {
    padding: 0 18px 18px;
  }
  .section.collapsed .section-body { display: none; }

  /* ------ KPI cards ------ */

    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;

  .kpi {

  .kpi-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 4px;

  .kpi-value {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--text-heading);

  .kpi.neg .kpi-value { color: var(--color-neg); }

    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 12px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-nested);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-small);
    padding: 4px 10px;
    font-size: 11px;
  }
  .chip .chip-label {
    color: var(--text-secondary);
    font-weight: 500;
  }
  .chip .chip-value {
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--text-heading);

  .chip.tone-neg { background: rgba(220,38,38,.06); border-color: rgba(220,38,38,.18); }
  .chip.tone-neg .chip-value { color: var(--color-neg); }

  .chip.tone-accent .chip-value { color: var(--accent); }

  .text-muted { color: var(--text-muted); }

<script>
(function() {
  'use strict';
  const data = JSON.parse(document.getElementById('results-data').textContent);

  // ---------- Formatters ----------
  function num(n) { return typeof n === 'string' ? Number(n) : n; }
  function isNum(n) { const v = num(n); return Number.isFinite(v); }
  function fmtINR(n) {
    if (n === null || n === undefined || n === '') return '–';
    const v = num(n);
    if (!Number.isFinite(v)) return '–';
    return '₹' + Math.round(v).toLocaleString('en-IN');
  }
  function fmtINRsigned(n) {
    if (!isNum(n)) return '–';
    const v = num(n);
    if (v === 0) return '₹0';
    const sign = v > 0 ? '+' : '–';
    return sign + '₹' + Math.abs(Math.round(v)).toLocaleString('en-IN');
  }
  function fmtPct(p, dp) {
    if (p === null || p === undefined) return '–';
    const v = num(p);
    if (!Number.isFinite(v)) return '–';
    return v.toFixed(dp == null ? 1 : dp) + '%';
  }
  function fmtNum(n, dp) {
    if (!isNum(n)) return '–';
    const v = num(n);
    return v.toLocaleString('en-IN', { minimumFractionDigits: dp || 0, maximumFractionDigits: dp || 0 });
  }
  function fmtBool(b) { return b ? 'Yes' : 'No'; }
  function fmtBoolFlag(b, posIsGreen) {
    const txt = b ? 'Yes' : 'No';
    if (posIsGreen) return b ? '<span class="text-pos">'+txt+'</span>' : '<span class="text-muted">'+txt+'</span>';
    return b ? '<span class="text-neg">'+txt+'</span>' : '<span class="text-muted">'+txt+'</span>';
  }
  function humanize(s) {
    if (!s) return '–';
    return String(s).replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  function dt(s) {
    if (!s) return '–';
    try { return new Date(s).toISOString().replace('T', ' ').replace(/\.\d+Z?$/, '') + ' UTC'; }
    catch (e) { return s; }
  }

  // ---------- Subgroup color mapping ----------
  function subgroupClass(sg) {
    const s = (sg || '').toLowerCase();
    if (s.includes('debt') || s.includes('arbitrage')) return 'left-debt';
    if (s.includes('gold') || s.includes('commodit') || s === 'multi_asset' || s.includes('alternative')) return 'left-others';
    return 'left-equity';
  }

  // ---------- HTML helpers ----------
  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === 'class') e.className = attrs[k];
        else if (k === 'html') e.innerHTML = attrs[k];
        else if (k === 'text') e.textContent = attrs[k];
        else if (k === 'on' && typeof attrs[k] === 'object') {
          for (const ev in attrs[k]) e.addEventListener(ev, attrs[k][ev]);
        }
        else e.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      const list = Array.isArray(children) ? children : [children];
      list.forEach(c => {
        if (c == null || c === false) return;
        if (typeof c === 'string') e.appendChild(document.createTextNode(c));
        else e.appendChild(c);
      });
    }
    return e;
  }

  function kpi(label, value, opts) {
    opts = opts || {};
    const cls = 'kpi' + (opts.tone ? ' ' + opts.tone : '') + (opts.compact ? ' compact' : '');
    const valCls = 'kpi-value' + (opts.smallValue ? ' small' : '');
    return el('div', { class: cls }, [
      el('div', { class: 'kpi-label', text: label }),
      el('div', { class: valCls, html: value == null ? '–' : String(value) }),
      opts.sub ? el('div', { class: 'kpi-sub', text: opts.sub }) : null
    ]);
  }

  function chip(label, value, tone) {
    return el('div', { class: 'chip' + (tone ? ' tone-' + tone : '') }, [
      el('span', { class: 'chip-label', text: label }),
      el('span', { class: 'chip-value', html: value == null ? '–' : String(value) })
    ]);
  }

  function makeSection(title, subtitle, bodyEl, opts) {
    opts = opts || {};
    const sec = el('div', { class: 'section' + (opts.collapsedDefault ? ' collapsed' : '') });
    const header = el('div', { class: 'section-header' }, [
      el('div', { class: 'section-title' }, [
        title,
        subtitle ? el('span', { class: 'section-subtitle', text: subtitle }) : null
      ]),
      el('span', { class: 'section-toggle', text: '▼' })
    ]);
    header.addEventListener('click', () => sec.classList.toggle('collapsed'));
    const body = el('div', { class: 'section-body' });
    body.appendChild(bodyEl);
    sec.appendChild(header);
    sec.appendChild(body);
    return sec;
  }

  // ---------- Render: Header KPIs ----------
  function renderHeaderKPIs(p) {
    const inp = p.input;
    const tot = p.rebalancing_response.totals;
    const row = el('div', { class: 'kpi-row' });
    row.appendChild(kpi('Corpus', fmtINR(inp.total_corpus)));
    row.appendChild(kpi('Tax Regime', humanize(inp.tax_regime)));
    row.appendChild(kpi('Net Buy', fmtINR(tot.total_buy_inr), { tone: 'pos', smallValue: true }));
    row.appendChild(kpi('Net Sell', fmtINR(tot.total_sell_inr), { tone: 'neg', smallValue: true }));
    row.appendChild(kpi('Tax Estimate', fmtINR(tot.total_tax_estimate_inr), { smallValue: true }));
    row.appendChild(kpi('Exit Load', fmtINR(tot.total_exit_load_inr), { smallValue: true }));
    row.appendChild(kpi('Trades', fmtNum(p.rebalancing_response.trade_list.length)));
    row.appendChild(kpi('Warnings', fmtNum((p.rebalancing_response.warnings || []).length), { tone: (p.rebalancing_response.warnings || []).length ? 'neg' : 'muted' }));
    return row;
  }

  // ---------- Render: Section A — Inputs ----------
  function renderInputs(p) {
    const wrap = el('div');
    const inp = p.input;

    // Profile basics
    wrap.appendChild(el('div', { class: 'h3', text: 'Client profile' }));
    const r1 = el('div', { class: 'kpi-row' });
    r1.appendChild(kpi('Age', fmtNum(inp.age)));
    r1.appendChild(kpi('Occupation', humanize(inp.occupation_type)));
    r1.appendChild(kpi('Annual Income', fmtINR(inp.annual_income)));
    r1.appendChild(kpi('Total Corpus', fmtINR(inp.total_corpus)));
    r1.appendChild(kpi('Net Financial Assets', fmtINR(inp.net_financial_assets)));
    r1.appendChild(kpi('Monthly Expense', fmtINR(inp.monthly_household_expense)));
    r1.appendChild(kpi('Tax Regime', humanize(inp.tax_regime)));
    r1.appendChild(kpi('Effective Tax Rate', fmtPct(inp.effective_tax_rate)));
    r1.appendChild(kpi('80C Utilised', fmtINR(inp.section_80c_utilized)));
    wrap.appendChild(r1);

    // Risk scoring
    wrap.appendChild(el('div', { class: 'h3', text: 'Risk profile' }));
    const r2 = el('div', { class: 'kpi-row' });
    r2.appendChild(kpi('Effective Risk Score', fmtNum(inp.effective_risk_score, 4)));
    r2.appendChild(kpi('Risk Capacity', fmtNum(inp.risk_capacity_score, 4)));
    r2.appendChild(kpi('Risk Willingness', fmtNum(inp.risk_willingness, 4)));
    r2.appendChild(kpi('OSI', fmtNum(inp.osi, 2)));
    r2.appendChild(kpi('Savings Adjustment', humanize(inp.savings_rate_adjustment), { smallValue: true }));
    r2.appendChild(kpi('Gap > 3', fmtBool(inp.gap_exceeds_3)));
    r2.appendChild(kpi('Shortfall', inp.shortfall_amount == null ? '–' : fmtINR(inp.shortfall_amount)));
    wrap.appendChild(r2);

    // Flag chips
    const flags = el('div', { class: 'chip-row' });
    flags.appendChild(chip('Emergency fund needed', inp.emergency_fund_needed ? 'Yes' : 'No', inp.emergency_fund_needed ? 'warn' : null));
    flags.appendChild(chip('Primary income from portfolio', inp.primary_income_from_portfolio ? 'Yes' : 'No', inp.primary_income_from_portfolio ? 'warn' : null));
    flags.appendChild(chip('Intergenerational transfer', inp.intergenerational_transfer ? 'Yes' : 'No', inp.intergenerational_transfer ? 'accent' : null));
    wrap.appendChild(flags);

    // Multi-asset composition
    if (inp.multi_asset_composition) {
      wrap.appendChild(el('div', { class: 'h3', text: 'Multi-asset composition' }));
      const c = inp.multi_asset_composition;
      const bar = el('div', { class: 'comp-bar' });
      bar.appendChild(el('div', { class: 'comp-seg equity', style: 'width:' + c.equity_pct + '%' }));
      bar.appendChild(el('div', { class: 'comp-seg debt', style: 'width:' + c.debt_pct + '%' }));
      bar.appendChild(el('div', { class: 'comp-seg others', style: 'width:' + c.others_pct + '%' }));
      wrap.appendChild(bar);
      const compChips = el('div', { class: 'chip-row' });
      compChips.appendChild(chip('Equity', fmtPct(c.equity_pct)));
      compChips.appendChild(chip('Debt', fmtPct(c.debt_pct)));
      compChips.appendChild(chip('Others', fmtPct(c.others_pct)));
      wrap.appendChild(compChips);
    }

    // Market commentary
    if (inp.market_commentary) {
      wrap.appendChild(el('div', { class: 'h3', text: 'Market commentary scores' }));
      const mc = el('div', { class: 'chip-row' });
      Object.keys(inp.market_commentary).forEach(k => {
        mc.appendChild(chip(humanize(k), fmtNum(inp.market_commentary[k], 1)));
      });
      wrap.appendChild(mc);
    }

    // Goals
    if (inp.goals && inp.goals.length) {
      wrap.appendChild(el('div', { class: 'h3', text: 'Goals' }));
      const tbl = el('table', { class: 'tbl' });
      tbl.innerHTML = '<thead><tr>'
        + '<th>Goal</th><th>Investment Goal</th><th>Priority</th>'
        + '<th class="num">Time (mo)</th><th class="num">Amount Needed</th>'
        + '</tr></thead>';
      const tb = el('tbody');
      inp.goals.forEach(g => {
        const tr = el('tr');
        tr.innerHTML = '<td>' + (g.goal_name || '–') + '</td>'
          + '<td>' + humanize(g.investment_goal) + '</td>'
          + '<td>' + humanize(g.goal_priority) + '</td>'
          + '<td class="num">' + fmtNum(g.time_to_goal_months) + '</td>'
          + '<td class="num">' + fmtINR(g.amount_needed) + '</td>';
        tb.appendChild(tr);
      });
      tbl.appendChild(tb);
      wrap.appendChild(el('div', { class: 'table-wrap' }, [tbl]));
    }

    // Holdings
    if (p.holdings && p.holdings.length) {
      wrap.appendChild(el('div', { class: 'h3', text: 'Starting holdings (' + p.holdings.length + ')' }));
      const tbl = el('table', { class: 'tbl' });
      tbl.innerHTML = '<thead><tr>'
        + '<th>Fund</th><th>Sub-category</th><th>Subgroup</th>'
        + '<th class="num">Present (₹)</th><th class="num">Rating</th><th>Recommended</th><th>ISIN</th>'
        + '</tr></thead>';
      const tb = el('tbody');
      p.holdings.forEach(h => {
        const tr = el('tr');
        tr.innerHTML = '<td>' + (h.fund_name || '–') + '</td>'
          + '<td>' + (h.sub_category || '–') + '</td>'
          + '<td>' + humanize(h.asset_subgroup) + '</td>'
          + '<td class="num">' + fmtINR(h.present_inr) + '</td>'
          + '<td class="num">' + fmtNum(h.fund_rating) + '</td>'
          + '<td><span class="' + (h.is_recommended ? 'recommended-yes' : 'recommended-no') + '">' + (h.is_recommended ? 'Yes' : 'No') + '</span></td>'
          + '<td class="mono">' + (h.isin || '–') + '</td>';
        tb.appendChild(tr);
      });
      tbl.appendChild(tb);
      wrap.appendChild(el('div', { class: 'table-wrap' }, [tbl]));
    }

    return wrap;
  }

  // ---------- Render: Step blocks for one fund row ----------
  function renderStepBlocks(a) {
    const wrap = el('div');

    // Identity strip
    const ident = el('div', { class: 'chip-row' });
    ident.appendChild(chip('ISIN', a.isin || '–'));
    ident.appendChild(chip('Sub-category', a.sub_category || '–'));
    ident.appendChild(chip('Rank', a.rank));
    ident.appendChild(chip('Rating', a.fund_rating));
    ident.appendChild(chip('Recommended', a.is_recommended ? 'Yes' : 'No', a.is_recommended ? 'pos' : 'warn'));
    ident.appendChild(chip('Current NAV', a.current_nav == null ? '–' : fmtNum(a.current_nav, 4)));
    ident.appendChild(chip('Invested cost', fmtINR(a.invested_cost_inr)));
    ident.appendChild(chip('Target pre-cap (₹)', fmtINR(a.target_amount_pre_cap)));
    wrap.appendChild(ident);

    // Step 1
    const s1 = el('div', { class: 'step-block' });
    s1.appendChild(el('div', { class: 'step-title', html: '<span class="step-num">1</span>Cap & spill' }));
    const r1 = el('div', { class: 'kpi-row' });
    r1.appendChild(kpi('Max %', fmtPct(a.max_pct), { compact: true, smallValue: true }));
    r1.appendChild(kpi('Pre-cap %', fmtPct(a.target_pre_cap_pct, 2), { compact: true, smallValue: true }));
    r1.appendChild(kpi('Own-capped %', fmtPct(a.target_own_capped_pct, 2), { compact: true, smallValue: true }));
    r1.appendChild(kpi('Final target %', fmtPct(a.final_target_pct, 2), { compact: true, smallValue: true }));
    r1.appendChild(kpi('Final target ₹', fmtINR(a.final_target_amount), { compact: true, smallValue: true }));
    s1.appendChild(r1);
    wrap.appendChild(s1);

    // Step 2
    const s2 = el('div', { class: 'step-block' });
    s2.appendChild(el('div', { class: 'step-title', html: '<span class="step-num">2</span>Compare & decide' }));
    const r2 = el('div', { class: 'kpi-row' });
    r2.appendChild(kpi('Present ₹', fmtINR(a.present_allocation_inr), { compact: true, smallValue: true }));
    r2.appendChild(kpi('Diff', fmtINRsigned(a.diff), { compact: true, smallValue: true, tone: a.diff > 0 ? 'pos' : (a.diff < 0 ? 'neg' : '') }));
    r2.appendChild(kpi('Exit flag', a.exit_flag ? '<span class="text-neg">Yes</span>' : '<span class="text-muted">No</span>', { compact: true, smallValue: true }));
    r2.appendChild(kpi('Worth to change', a.worth_to_change ? '<span class="text-pos">Yes</span>' : '<span class="text-muted">No</span>', { compact: true, smallValue: true }));
    s2.appendChild(r2);
    wrap.appendChild(s2);

    // Step 3
    const s3 = el('div', { class: 'step-block' });
    s3.appendChild(el('div', { class: 'step-title', html: '<span class="step-num">3</span>Tax classification' }));
    const r3 = el('div', { class: 'kpi-row' });
    r3.appendChild(kpi('ST value', fmtINR(a.st_value_inr), { compact: true, smallValue: true }));
    r3.appendChild(kpi('ST cost', fmtINR(a.st_cost_inr), { compact: true, smallValue: true }));
    r3.appendChild(kpi('STCG', fmtINR(a.stcg_amount), { compact: true, smallValue: true, tone: a.stcg_amount > 0 ? 'neg' : (a.stcg_amount < 0 ? 'pos' : '') }));
    r3.appendChild(kpi('LT value', fmtINR(a.lt_value_inr), { compact: true, smallValue: true }));
    r3.appendChild(kpi('LT cost', fmtINR(a.lt_cost_inr), { compact: true, smallValue: true }));
    r3.appendChild(kpi('LTCG', fmtINR(a.ltcg_amount), { compact: true, smallValue: true, tone: a.ltcg_amount > 0 ? 'neg' : (a.ltcg_amount < 0 ? 'pos' : '') }));
    r3.appendChild(kpi('Units in EL period', fmtNum(num(a.units_within_exit_load_period), 4), { compact: true, smallValue: true }));
    r3.appendChild(kpi('Exit load %', fmtPct(a.exit_load_pct), { compact: true, smallValue: true }));
    r3.appendChild(kpi('Exit load ₹', fmtINR(a.exit_load_amount), { compact: true, smallValue: true, tone: a.exit_load_amount > 0 ? 'neg' : '' }));
    s3.appendChild(r3);
    wrap.appendChild(s3);

    // Step 4
    const s4 = el('div', { class: 'step-block' });
    s4.appendChild(el('div', { class: 'step-title', html: '<span class="step-num">4</span>Initial trades under STCG cap' }));
    const r4 = el('div', { class: 'kpi-row' });
    r4.appendChild(kpi('Buy ₹', fmtINR(a.pass1_buy_amount), { compact: true, smallValue: true, tone: a.pass1_buy_amount > 0 ? 'pos' : '' }));
    r4.appendChild(kpi('Underbuy ₹', fmtINR(a.pass1_underbuy_amount), { compact: true, smallValue: true, tone: a.pass1_underbuy_amount > 0 ? 'neg' : '' }));
    r4.appendChild(kpi('Sell ₹', fmtINR(a.pass1_sell_amount), { compact: true, smallValue: true, tone: a.pass1_sell_amount > 0 ? 'neg' : '' }));
    r4.appendChild(kpi('Undersell ₹', fmtINR(a.pass1_undersell_amount), { compact: true, smallValue: true, tone: a.pass1_undersell_amount > 0 ? 'neg' : '' }));
    r4.appendChild(kpi('Sell LT ₹', fmtINR(a.pass1_sell_lt_amount), { compact: true, smallValue: true }));
    r4.appendChild(kpi('Realised LTCG', fmtINR(a.pass1_realised_ltcg), { compact: true, smallValue: true }));

    r4.appendChild(kpi('Undersell due STCG cap', fmtINR(a.pass1_undersell_due_to_stcg_cap), { compact: true, smallValue: true, tone: a.pass1_undersell_due_to_stcg_cap > 0 ? 'neg' : '' }));
    r4.appendChild(kpi('Blocked STCG ₹', fmtINR(a.pass1_blocked_stcg_value), { compact: true, smallValue: true }));
    r4.appendChild(kpi('Holding after pass-1', fmtINR(a.holding_after_initial_trades), { compact: true, smallValue: true, tone: 'muted' }));
    s4.appendChild(r4);
    wrap.appendChild(s4);

    // Step 5
    const s5 = el('div', { class: 'step-block' });
    s5.appendChild(el('div', { class: 'step-title', html: '<span class="step-num">5</span>Loss-offset top-up' }));
    const r5 = el('div', { class: 'kpi-row' });
    r5.appendChild(kpi('STCG offset ₹', fmtINR(a.stcg_offset_amount), { compact: true, smallValue: true }));
    r5.appendChild(kpi('Pass-2 sell ₹', fmtINR(a.pass2_sell_amount), { compact: true, smallValue: true, tone: a.pass2_sell_amount > 0 ? 'neg' : '' }));
    r5.appendChild(kpi('Pass-2 undersell ₹', fmtINR(a.pass2_undersell_amount), { compact: true, smallValue: true, tone: a.pass2_undersell_amount > 0 ? 'neg' : '' }));
    r5.appendChild(kpi('Final holding ₹', fmtINR(a.final_holding_amount), { compact: true, smallValue: true, tone: 'muted' }));
    s5.appendChild(r5);
    wrap.appendChild(s5);

    return wrap;
  }

  // ---------- Render: Section B — Step-by-step ----------
  function renderStepByStep(p) {
    const wrap = el('div');
    const subgroups = p.rebalancing_response.subgroups || [];
    if (!subgroups.length) {
      wrap.appendChild(el('div', { class: 'empty', text: 'No subgroups in response.' }));
      return wrap;
    }

    subgroups.forEach((sg, sgIdx) => {
      const sgCard = el('div', { class: 'subgroup-card ' + subgroupClass(sg.asset_subgroup) + (sgIdx > 0 ? ' collapsed' : '') });
      const reb = num(sg.rebalance_inr);
      const summary = el('div', { class: 'subgroup-summary' }, [
        el('span', { text: 'target ' }), el('span', { class: 'mono', text: fmtINR(sg.goal_target_inr) }),
        el('span', { text: ' · current ' }), el('span', { class: 'mono', text: fmtINR(sg.current_holding_inr) }),
        el('span', { text: ' · final ' }), el('span', { class: 'mono', text: fmtINR(sg.suggested_final_holding_inr) }),
        el('span', { text: ' · rebal ' }),
        el('span', { class: 'mono ' + (reb > 0 ? 'delta-pos' : (reb < 0 ? 'delta-neg' : '')), text: fmtINRsigned(sg.rebalance_inr) }),
        el('span', { text: ' · ' + sg.ranks_with_action + '/' + sg.ranks_total + ' actions' })
      ]);
      const header = el('div', { class: 'subgroup-header' }, [
        el('div', null, [
          el('div', { class: 'subgroup-name' }, [
            humanize(sg.asset_subgroup),
            el('span', { class: 'section-subtitle', text: sg.actions.length + ' fund' + (sg.actions.length === 1 ? '' : 's') })
          ]),
          summary
        ]),
        el('span', { class: 'subgroup-toggle', text: '▼' })
      ]);
      header.addEventListener('click', () => sgCard.classList.toggle('collapsed'));
      sgCard.appendChild(header);

      const body = el('div', { class: 'subgroup-body' });

      if (!sg.actions || !sg.actions.length) {
        body.appendChild(el('div', { class: 'empty', text: 'No actions for this subgroup.' }));
      } else {
        sg.actions.forEach((a, fIdx) => {
          const isBad = !a.is_recommended;
          const noAction = (!a.pass1_buy_amount && !a.pass1_sell_amount && !a.pass2_sell_amount && !a.exit_flag && a.present_allocation_inr === 0 && a.final_target_amount === 0);
          const fundCard = el('div', { class: 'fund-card collapsed' + (isBad ? ' bad' : '') + (noAction ? ' no-action' : '') });
          const rankBadge = '<span class="rank-badge' + (a.rank === 1 ? ' r1' : '') + '">R' + (a.rank == null ? '–' : a.rank) + '</span>';
          const fundMeta = el('div', { class: 'fund-meta' }, [
            el('span', { text: 'present ' + fmtINR(a.present_allocation_inr) }),
            el('span', { text: 'target ' + fmtINR(a.final_target_amount) }),
            el('span', { class: a.diff > 0 ? 'text-pos' : (a.diff < 0 ? 'text-neg' : ''), text: 'diff ' + fmtINRsigned(a.diff) }),
            isBad ? el('span', { class: 'text-neg', text: '· BAD fund (not recommended)' }) : null,
            a.exit_flag ? el('span', { class: 'text-neg', text: '· EXIT' }) : null,
            !a.worth_to_change && !a.exit_flag ? el('span', { class: 'text-muted', text: '· hold' }) : null
          ]);
          const fundHeader = el('div', { class: 'fund-header' }, [
            el('div', { class: 'fund-name', html: rankBadge + ' ' + (a.recommended_fund || '–') + ' <span class="text-muted" style="font-weight:500;font-size:11px;">· ' + (a.sub_category || '–') + '</span>' }),
            el('div', null, [fundMeta]),
            el('span', { class: 'fund-toggle', text: '▼' })
          ]);
          fundHeader.addEventListener('click', () => fundCard.classList.toggle('collapsed'));
          fundCard.appendChild(fundHeader);
          const fundBody = el('div', { class: 'fund-body' });
          fundBody.appendChild(renderStepBlocks(a));
          fundCard.appendChild(fundBody);
          body.appendChild(fundCard);
        });
      }
      sgCard.appendChild(body);
      wrap.appendChild(sgCard);
    });

    return wrap;
  }

  // ---------- Render: Section C — Output ----------
  function renderOutput(p) {
    const wrap = el('div');
    const tot = p.rebalancing_response.totals;
    const trades = p.rebalancing_response.trade_list || [];
    const warnings = p.rebalancing_response.warnings || [];
    const meta = p.rebalancing_response.metadata || {};

    // Totals KPI grid
    wrap.appendChild(el('div', { class: 'h3', text: 'Totals' }));
    const r = el('div', { class: 'kpi-row' });
    r.appendChild(kpi('Total Buy', fmtINR(tot.total_buy_inr), { tone: 'pos' }));
    r.appendChild(kpi('Total Sell', fmtINR(tot.total_sell_inr), { tone: 'neg' }));
    r.appendChild(kpi('Net Cash Flow', fmtINRsigned(tot.net_cash_flow_inr), { smallValue: true, tone: tot.net_cash_flow_inr > 0 ? 'pos' : (tot.net_cash_flow_inr < 0 ? 'neg' : '') }));
    r.appendChild(kpi('STCG Realised', fmtINR(tot.total_stcg_realised), { smallValue: true }));
    r.appendChild(kpi('LTCG Realised', fmtINR(tot.total_ltcg_realised), { smallValue: true }));
    r.appendChild(kpi('STCG Net-off', fmtINR(tot.total_stcg_net_off), { smallValue: true }));
    r.appendChild(kpi('Tax Estimate', fmtINR(tot.total_tax_estimate_inr), { smallValue: true }));
    r.appendChild(kpi('Exit Load', fmtINR(tot.total_exit_load_inr), { smallValue: true }));
    r.appendChild(kpi('Unrebal. Remainder', fmtINR(tot.unrebalanced_remainder_inr), { smallValue: true, tone: tot.unrebalanced_remainder_inr > 0 ? 'neg' : 'muted' }));
    wrap.appendChild(r);

    const r2 = el('div', { class: 'kpi-row' });
    r2.appendChild(kpi('Rows', fmtNum(tot.rows_count), { compact: true }));
    r2.appendChild(kpi('To Buy', fmtNum(tot.funds_to_buy_count), { compact: true, tone: 'pos' }));
    r2.appendChild(kpi('To Sell', fmtNum(tot.funds_to_sell_count), { compact: true, tone: 'neg' }));
    r2.appendChild(kpi('To Exit', fmtNum(tot.funds_to_exit_count), { compact: true, tone: 'neg' }));
    r2.appendChild(kpi('Held', fmtNum(tot.funds_held_count), { compact: true, tone: 'muted' }));
    r2.appendChild(kpi('Trades', fmtNum(trades.length), { compact: true }));
    if (meta.request_corpus_inr != null) r2.appendChild(kpi('Request Corpus', fmtINR(meta.request_corpus_inr), { compact: true, smallValue: true }));
    if (meta.request_id) r2.appendChild(kpi('Request ID', '<span class="mono" style="font-size:10px;">' + meta.request_id.slice(0, 8) + '…</span>', { compact: true, smallValue: true, sub: meta.request_id.slice(-12) }));
    wrap.appendChild(r2);

    // Trade list grouped by action
    wrap.appendChild(el('div', { class: 'h3', text: 'Trade list (' + trades.length + ')' }));
    if (!trades.length) {
      wrap.appendChild(el('div', { class: 'empty', text: 'No trades.' }));
    } else {
      const tbl = el('table', { class: 'tbl' });
      tbl.innerHTML = '<thead><tr>'
        + '<th>Action</th><th>Fund</th><th>Sub-category</th>'
        + '<th class="num">Amount</th><th>Reason</th><th>ISIN</th>'
        + '</tr></thead>';
      const tb = el('tbody');
      const order = { EXIT: 0, SELL: 1, BUY: 2 };
      const sorted = trades.slice().sort((a, b) => {
        const oa = order[a.action] == null ? 99 : order[a.action];
        const ob = order[b.action] == null ? 99 : order[b.action];
        if (oa !== ob) return oa - ob;
        return num(b.amount_inr) - num(a.amount_inr);
      });
      sorted.forEach(t => {
        const tr = el('tr');
        tr.innerHTML =
          '<td><span class="badge-action ' + (t.action || '') + '">' + (t.action || '–') + '</span></td>'
          + '<td>' + (t.recommended_fund || '–') + '</td>'
          + '<td>' + (t.sub_category || '–') + '</td>'
          + '<td class="num">' + fmtINR(t.amount_inr) + '</td>'
          + '<td><span class="reason-tag" title="' + (t.reason_text || '').replace(/"/g, '&quot;') + '">' + humanize(t.reason_code || '') + '</span><div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">' + (t.reason_title || '') + '</div></td>'
          + '<td class="mono">' + (t.isin || '–') + '</td>';
        tb.appendChild(tr);
      });
      tbl.appendChild(tb);
      wrap.appendChild(el('div', { class: 'table-wrap' }, [tbl]));
    }

    // Warnings
    wrap.appendChild(el('div', { class: 'h3', text: 'Warnings (' + warnings.length + ')' }));
    if (!warnings.length) {
      wrap.appendChild(el('div', { class: 'empty', text: 'No warnings.' }));
    } else {
      warnings.forEach(w => {
        const wc = el('div', { class: 'warn-card' });
        wc.appendChild(el('div', { class: 'warn-code', text: w.code || '–' }));
        wc.appendChild(el('div', { class: 'warn-msg', text: w.message || '–' }));
        if (w.affected_isins && w.affected_isins.length) {
          wc.appendChild(el('div', { class: 'warn-isins', text: 'ISINs: ' + w.affected_isins.join(', ') }));
        }
        wrap.appendChild(wc);
      });
    }

    return wrap;
  }

  // ---------- Render: Engine config ----------
  function renderEngineConfig() {
    const cfg = data.engine_config || {};
    const wrap = el('div');
    const r = el('div', { class: 'kpi-row' });
    r.appendChild(kpi('Multi-fund cap', fmtPct(cfg.multi_fund_cap_pct), { compact: true, smallValue: true }));
    r.appendChild(kpi('Others fund cap', fmtPct(cfg.others_fund_cap_pct), { compact: true, smallValue: true }));
    r.appendChild(kpi('Min change', fmtPct(cfg.rebalance_min_change_pct), { compact: true, smallValue: true }));
    r.appendChild(kpi('Exit floor rating', fmtNum(cfg.exit_floor_rating), { compact: true, smallValue: true }));
    r.appendChild(kpi('LTCG exemption', fmtINR(cfg.ltcg_annual_exemption_inr), { compact: true, smallValue: true }));
    r.appendChild(kpi('STCG rate (equity)', fmtPct(cfg.stcg_rate_equity_pct), { compact: true, smallValue: true }));
    r.appendChild(kpi('LTCG rate (equity)', fmtPct(cfg.ltcg_rate_equity_pct), { compact: true, smallValue: true }));
    r.appendChild(kpi('ST→LT equity (mo)', fmtNum(cfg.st_threshold_months_equity), { compact: true, smallValue: true }));
    r.appendChild(kpi('ST→LT debt (mo)', fmtNum(cfg.st_threshold_months_debt), { compact: true, smallValue: true }));
    wrap.appendChild(r);
    if (cfg.multi_cap_sub_categories && cfg.multi_cap_sub_categories.length) {
      wrap.appendChild(el('div', { class: 'h3', text: 'Multi-cap sub-categories' }));
      const cr = el('div', { class: 'chip-row' });
      cfg.multi_cap_sub_categories.forEach(s => cr.appendChild(chip('', s, 'accent')));
      wrap.appendChild(cr);
    }
    return wrap;
  }

  // ---------- Render: full profile ----------
  function renderProfile(name) {
    const p = data.profiles[name];
    const root = document.getElementById('profile-content');
    root.innerHTML = '';
    if (!p) {
      root.appendChild(el('div', { class: 'empty', text: 'Profile not found.' }));
      return;
    }

    // Top KPIs
    root.appendChild(renderHeaderKPIs(p));

    // Section A
    root.appendChild(makeSection('Input parameters', p.holdings.length + ' holdings · ' + (p.input.goals || []).length + ' goals · ' + humanize(p.input.tax_regime) + ' regime', renderInputs(p)));

    // Section B
    root.appendChild(makeSection('Step-by-step calculations', (p.rebalancing_response.subgroups || []).length + ' subgroups · ' + p.rebalancing_response.totals.rows_count + ' rows', renderStepByStep(p)));

    // Section C
    root.appendChild(makeSection('Rebalancing output', p.rebalancing_response.trade_list.length + ' trades · ' + (p.rebalancing_response.warnings || []).length + ' warnings', renderOutput(p)));
  }

  // ---------- Boot ----------
  document.getElementById('generated-at').textContent = dt(data.generated_at);
  document.getElementById('engine-version').textContent = data.engine_version || '–';
  document.getElementById('schema-version').textContent = data.schema_version || '–';
  document.getElementById('engine-config').appendChild(renderEngineConfig());

  const profileNames = Object.keys(data.profiles || {});
  const btnRow = document.getElementById('profile-buttons');
  let active = profileNames[0];

  profileNames.forEach(name => {
    const p = data.profiles[name];
    const corpus = p && p.input ? fmtINR(p.input.total_corpus) : '';
    const regime = p && p.input ? p.input.tax_regime : '';
    const btn = el('button', {
      class: 'pill-btn' + (name === active ? ' active' : ''),
      'data-name': name,
      title: corpus + ' · ' + (regime || '') + ' regime'
    }, [name]);
    btn.addEventListener('click', () => {
      active = name;
      Array.from(btnRow.children).forEach(b => b.classList.toggle('active', b.getAttribute('data-name') === active));
      renderProfile(active);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    btnRow.appendChild(btn);
  });

  if (active) renderProfile(active);
})();
</script>
</body>
</html>
