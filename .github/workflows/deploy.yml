# Deploy backend on the server over SSH: git pull, venv + pip, pm2 start or restart.
# No Docker — app runs via pm2 + Python venv on the host.
#
# GitHub Secrets (repository or "production" environment):
#   HOST, USERNAME, KEY   — preferred names for appleboy/ssh-action
#   EC2_HOST, EC2_USER, EC2_SSH_PRIVATE_KEY — still accepted as fallbacks
#
# Optional repository variable:
#   SSH_PORT          — SSH port if not 22 (e.g. 2222)
#   DEPLOY_BRANCH     — git branch to deploy (default: main)
#
# Server layout (adjust paths in the script below if yours differ):
#   ~/Prozpr_Backend  — git clone, with venv/ and pm2 managing the app
#
# PM2 app name: prozpr_backend (see ecosystem.config.cjs)

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Require SSH host and credentials
        env:
          SSH_HOST: ${{ secrets.HOST || secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.USERNAME || secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.KEY || secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "::error::Missing server host. Add secret HOST or EC2_HOST (IP or hostname) on the repo or production environment."
            exit 1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "::error::Missing SSH user. Add secret USERNAME or EC2_USER."
            exit 1
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Missing SSH private key. Add secret KEY or EC2_SSH_PRIVATE_KEY."
            exit 1
          fi

      - uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH || 'main' }}
        with:
          host: ${{ secrets.HOST || secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME || secrets.EC2_USER }}
          key: ${{ secrets.KEY || secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT != '' && vars.SSH_PORT || 22 }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          envs: DEPLOY_BRANCH
          script: |
            set -euo pipefail
            APP_DIR="${HOME}/Prozpr_Backend"
            APP_NAME="prozpr_backend"

            cd "${APP_DIR}"

            git fetch --all --prune
            git reset --hard "origin/${DEPLOY_BRANCH}"

            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            # shellcheck disable=SC1091
            source venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 not found; install with: npm install -g pm2"
              exit 1
            fi

            if pm2 describe "${APP_NAME}" >/dev/null 2>&1; then
              echo "PM2 process '${APP_NAME}' exists — reloading with updated code and env"
              pm2 reload ecosystem.config.cjs --only "${APP_NAME}" --update-env
            else
              echo "PM2 process '${APP_NAME}' not found — starting fresh via ecosystem.config.cjs"
              pm2 start ecosystem.config.cjs --only "${APP_NAME}"
            fi

            pm2 save
            pm2 status "${APP_NAME}"
