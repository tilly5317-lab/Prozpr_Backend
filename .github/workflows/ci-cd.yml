name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONPATH: ${{ github.workspace }}/AI_Agents/src
      PYTHONUTF8: "1"
      LANG: C.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Intent classifier tests (isolated LangChain stubs). Market commentary unittest module
      # uses import-time stubs that conflict with installed langchain-core; run those locally if needed.
      - name: AI_Agents unit tests (intent classifier)
        run: python -m unittest AI_Agents.tests.test_intent_classifier -v

      - name: Router unit tests (pytest)
        run: pytest AI_Agents/src/router/tests -v --tb=short

      - name: Goal-based allocation tests (pytest)
        run: pytest AI_Agents/src/goal_based_allocation/Testing -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: prozpr-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
