# Three separate jobs so GitHub shows three distinct checks:
#   1 · Lint
#   2 · Build & test
#   3 · Deploy (main branch pushes only; skipped on pull requests)
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: "1 · Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check (compileall)
        run: python -m compileall -q app main.py wealth_core scripts

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff (undefined names / parse errors)
        run: ruff check app main.py wealth_core scripts --select F821,F822,E999

  build_and_test:
    name: "2 · Build & test"
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/AI_Agents/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            AI_Agents/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r AI_Agents/requirements.txt

      - name: Run tests
        run: python -m unittest discover -s AI_Agents/tests -p "test_*.py" -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: prozpr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: "3 · Deploy"
    needs: build_and_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.IMAGE }}:latest
            ${{ steps.image.outputs.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
